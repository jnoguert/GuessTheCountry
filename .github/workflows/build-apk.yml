name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build web assets (offline bundle includes game.json)
        working-directory: frontend
        run: |
          npm ci --no-audit
          npm run build
          npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk GuessTheCountry.apk

      - uses: actions/upload-artifact@v4
        with:
          name: GuessTheCountry-apk
          path: GuessTheCountry.apk
          retention-days: 30
