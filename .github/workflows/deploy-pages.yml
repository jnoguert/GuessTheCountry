name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE: /Redactica/
          # Repo Variables, not Secrets: the anon key is meant to be public
          # client-side (Row Level Security is the real security boundary,
          # not key secrecy). Set both under Settings -> Secrets and
          # variables -> Actions -> Variables. Leaving them unset is fine --
          # the leaderboard just won't appear (see lib/leaderboard.ts).
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci --no-audit
          npm run build

      - name: Verify game data is present
        run: test -s frontend/dist/game.json

      # Pages must be enabled once in the repo settings:
      # Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
