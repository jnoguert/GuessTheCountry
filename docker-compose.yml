version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guess-the-country-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/app/data
      - ./backend/pipeline:/app/pipeline
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    networks:
      - guess-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL the BROWSER uses to reach the backend (baked in at build time)
        - VITE_API_BASE=http://localhost:8000/api
    container_name: guess-the-country-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guess-network

networks:
  guess-network:
    driver: bridge

volumes:
  backend-data:
